<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adopt Me! | Safe Haven Dog Ranch</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #ffde59;
      font-family: 'Outfit', sans-serif;
      text-align: center;
    }
    .emoji {
      font-size: 15rem;
      animation: bounce 2s infinite;
    }
    h1 {
      font-size: 4rem;
      color: #333;
      margin-top: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-30px); }
      60% { transform: translateY(-15px); }
    }
    a {
      margin-top: 2rem;
      padding: 1rem 2rem;
      background-color: #ff5757;
      color: white;
      text-decoration: none;
      font-size: 1.5rem;
      border-radius: 50px;
      font-weight: bold;
      transition: 0.3s ease;
    }
    a:hover {
      background-color: #d14141;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="emoji">🐶</div>
  <h1>Adopt Me!</h1>
  <a href="index.html">Back to Home</a>
<footer style="background: #2b2b2b; color: white; padding: 4rem 2rem; margin-top: 4rem;">
    <div style="max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem;">
      
      <div>
        <h3 style="color: var(--primary-color); margin-bottom: 1rem;">🐾 Safe Haven Dog Ranch</h3>
        <p>123 Rescue Way<br>Edinburg, Texas 78541</p>
        <p>contact@safehavendogranch.com</p>
      </div>

      <div>
        <h3 style="color: var(--primary-color); margin-bottom: 1rem;">Newsletter</h3>
        <p style="margin-bottom: 1rem;">Sign up for our "Monthly Paws" newsletter!</p>
        <form action="#" style="display: flex; gap: 0.5rem;">
          <input type="email" placeholder="Your Email" style="padding: 10px; border-radius: 5px; border: none; width: 100%;">
          <button class="btn btn-accent" style="padding: 10px 20px;">Subscribe</button>
        </form>
      </div>

      <div>
        <h3 style="color: var(--primary-color); margin-bottom: 1rem;">Follow Us</h3>
        <!-- Facebook Feed Embedded -->
        <iframe src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2F61577525760282&tabs=timeline&width=340&height=350&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true&appId" 
                width="340" 
                height="350" 
                style="border:none;overflow:hidden;width:100%;max-width:340px;height:350px;border-radius:8px;" 
                scrolling="no" 
                frameborder="0" 
                allowfullscreen="true" 
                allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
        </iframe>
      </div>
      
    </div>
    <div style="text-align: center; margin-top: 3rem; color: #888; font-size: 0.9rem;">
      &copy; 2026 Safe Haven Dog Ranch. A registered 501(c)(3) non-profit.
    </div>
  </footer>
</body>
</html>
