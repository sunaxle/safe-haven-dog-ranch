<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Emoji Test | Safe Haven</title>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      text-align: center;
      background-color: #fdf6e3;
      padding: 50px;
      margin: 0;
    }
    h1 {
      color: #333;
      font-size: 3rem;
    }
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 30px;
      margin-top: 50px;
      padding: 20px;
    }
    .emoji {
      font-size: 6rem;
      transition: transform 0.3s ease;
      cursor: pointer;
    }
    .emoji:hover {
      transform: scale(1.3) rotate(10deg);
    }
    .btn-home {
      display: inline-block;
      margin-top: 50px;
      padding: 15px 30px;
      background-color: #ff5757;
      color: white;
      text-decoration: none;
      font-size: 1.2rem;
      border-radius: 50px;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    .btn-home:hover {
      background-color: #d14141;
    }
  </style>
</head>
<body>
  <h1>Dog Emoji Test Page 🐾</h1>
  <p style="font-size: 1.2rem; color: #666;">Hover over the pups below!</p>
  
  <div class="emoji-grid">
    <div class="emoji">🐕</div>
    <div class="emoji">🐶</div>
    <div class="emoji">🐩</div>
    <div class="emoji">🦮</div>
    <div class="emoji">🐕‍🦺</div>
    <div class="emoji">🌭</div>
    <div class="emoji">🦴</div>
    <div class="emoji">🎾</div>
  </div>

  <a href="index.html" class="btn-home">Back to Home</a>
</body>
</html>
