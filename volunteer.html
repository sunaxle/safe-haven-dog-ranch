<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer / Foster | Safe Haven Dog Ranch</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container nav-wrapper">
      <nav>
        <a href="index.html" class="logo">
          <img src="assets/IMG_4718.JPEG" alt="Safe Haven Dog Ranch Logo" style="height: 50px; border-radius: 50%;">
          Safe Haven <span>Dog Ranch</span>
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Adopt</a></li>
          <li><a href="emojidog.html">Emoji Dog</a></li>
          <li><a href="volunteer.html" style="color: var(--primary-color);">Volunteer / Foster</a></li>
          <li><a href="special-needs.html">Special Needs</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="donate.html" class="btn btn-accent">Support the Pups!</a></li>
        </ul>
        <button class="mobile-menu-btn">☰</button>
      </nav>
    </div>
  </header>

  <main style="padding: 4rem 2rem; text-align: center; background-color: var(--bg-light);">
    <div class="container" style="max-width: 600px; margin: 0 auto; background: var(--bg-white); padding: 3rem; border-radius: var(--radius); box-shadow: var(--shadow);">
      <h2 style="color: var(--primary-color); margin-bottom: 1rem;">Volunteer & Foster Intake Form</h2>
      <p style="margin-bottom: 2rem;">Formulario de Ingreso de Voluntarios y Acogida</p>

      <form name="volunteer-intake" method="POST" data-netlify="true" action="/success.html" style="display: flex; flex-direction: column; gap: 1rem; text-align: left;">
        <div>
          <label for="name" style="font-weight: 600;">Full Name / Nombre Completo</label>
          <input type="text" id="name" name="name" required style="width: 100%; padding: 0.8rem; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <div>
          <label for="email" style="font-weight: 600;">Email Address / Correo Electrónico</label>
          <input type="email" id="email" name="email" required style="width: 100%; padding: 0.8rem; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <div>
          <label for="phone" style="font-weight: 600;">Phone Number / Número de Teléfono</label>
          <input type="tel" id="phone" name="phone" required style="width: 100%; padding: 0.8rem; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <div>
          <label for="interest" style="font-weight: 600;">I am interested in / Estoy interesado en:</label>
          <select id="interest" name="interest" required style="width: 100%; padding: 0.8rem; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-family: inherit;">
            <option value="volunteer">Volunteering / Ser voluntario</option>
            <option value="foster">Fostering a dog / Acoger a un perro</option>
            <option value="both">Both / Ambos</option>
          </select>
        </div>
        <div>
          <label for="message" style="font-weight: 600;">Message / Mensaje</label>
          <textarea id="message" name="message" rows="4" style="width: 100%; padding: 0.8rem; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 4px;"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem; padding: 1rem; font-size: 1.1rem; text-align: center; cursor: pointer;">Submit / Enviar</button>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="footer-bottom" style="text-align: center; padding: 2rem 0;">
        <p>&copy; 2026 Safe Haven Dog Ranch. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
