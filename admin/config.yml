backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site_content"
    label: "Website Text & Photos"
    editor:
      preview: false
    files:
      - file: "site-content.json"
        label: "Homepage Settings"
        name: "homepage"
        fields:
          - {label: "Hero Headline", name: "hero_headline", widget: "string"}
          - {label: "Hero Subheadline", name: "hero_subheadline", widget: "string"}
          - {label: "Hero Video/Image", name: "hero_media", widget: "file"}
          - {label: "Mission 1 Title", name: "mission_1_title", widget: "string"}
          - {label: "Mission 1 Text", name: "mission_1_text", widget: "text"}
          - {label: "Mission 2 Title", name: "mission_2_title", widget: "string"}
          - {label: "Mission 2 Text", name: "mission_2_text", widget: "text"}
